name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "既存のstable ReleaseからHomebrew Formula公開を再開するtag"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: tagとsourceを検証
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      revision: ${{ steps.release.outputs.revision }}
      stable: ${{ steps.release.outputs.stable }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: release tagを検証
        id: release
        env:
          RECOVERY_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == workflow_dispatch ]]; then
            tag="${RECOVERY_TAG}"
            go run ./tools/releaseversion --stable "${tag}" >>"${GITHUB_OUTPUT}"
          else
            go run ./tools/releaseversion "${tag}" >>"${GITHUB_OUTPUT}"
          fi
          revision=$(git rev-list -n 1 -- "${tag}")
          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "revision=${revision}" >>"${GITHUB_OUTPUT}"

      - name: canonical full gateを実行
        run: ./scripts/check.sh full

  build:
    name: ${{ matrix.goos }} ${{ matrix.goarch }}をbuild
    if: github.event_name == 'push'
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.preflight.outputs.revision }}
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: archiveをbuildして検証
        run: |
          ./scripts/package-release.sh \
            "${{ needs.preflight.outputs.tag }}" \
            "${{ needs.preflight.outputs.revision }}" \
            "${{ matrix.goos }}" \
            "${{ matrix.goarch }}" \
            dist

      - name: archiveをupload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: GitHub Releaseを公開
    if: github.event_name == 'push'
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 正確なrelease tagをcheckout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.preflight.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: archiveをdownload
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: checksumを作成
        shell: bash
        run: |
          mapfile -t archives < <(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) | sort)
          test "${#archives[@]}" -eq 5
          (cd dist && sha256sum -- *.tar.gz *.zip | sort -k2 > checksums.txt)

      - name: GitHub Releaseを作成
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          tag="${{ needs.preflight.outputs.tag }}"
          args=(--verify-tag --title "${tag}" --notes-from-tag)
          if [[ "${{ needs.preflight.outputs.stable }}" != true ]]; then
            args+=(--prerelease)
          fi
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "release ${tag} already exists; refusing to replace immutable release assets" >&2
            exit 1
          fi
          gh release create "${tag}" dist/* "${args[@]}"

      - name: Formula job用checksumをupload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-checksums
          path: dist/checksums.txt
          if-no-files-found: error

  recover_formula_input:
    name: 既存ReleaseのFormula入力を検証
    if: github.event_name == 'workflow_dispatch' && needs.preflight.outputs.stable == 'true'
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 公開済み資産をdownload
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        shell: bash
        run: |
          metadata=$(gh release view "${RELEASE_TAG}" --json tagName,isDraft,isPrerelease --jq '[.tagName, .isDraft, .isPrerelease] | @tsv')
          expected_metadata=$(printf '%s\tfalse\tfalse' "${RELEASE_TAG}")
          test "${metadata}" = "${expected_metadata}"
          mkdir dist
          gh release download "${RELEASE_TAG}" --dir dist

      - name: 公開済み資産とchecksumを検証
        shell: bash
        run: |
          mapfile -t entries < <(find dist -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort)
          expected=(
            checksums.txt
            "cwk_${{ needs.preflight.outputs.tag }}_darwin_amd64.tar.gz"
            "cwk_${{ needs.preflight.outputs.tag }}_darwin_arm64.tar.gz"
            "cwk_${{ needs.preflight.outputs.tag }}_linux_amd64.tar.gz"
            "cwk_${{ needs.preflight.outputs.tag }}_linux_arm64.tar.gz"
            "cwk_${{ needs.preflight.outputs.tag }}_windows_amd64.zip"
          )
          mapfile -t expected < <(printf '%s\n' "${expected[@]}" | sort)
          test "${entries[*]}" = "${expected[*]}"
          test "$(wc -l < dist/checksums.txt)" -eq 5
          (cd dist && sha256sum --check checksums.txt)

      - name: Formula job用checksumをupload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-checksums
          path: dist/checksums.txt
          if-no-files-found: error

  formula:
    name: checksum固定済みHomebrew Formulaを生成・audit
    if: >-
      always() &&
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.stable == 'true' &&
      ((github.event_name == 'push' && needs.publish.result == 'success') ||
      (github.event_name == 'workflow_dispatch' && needs.recover_formula_input.result == 'success'))
    needs: [preflight, publish, recover_formula_input]
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: 正確なrelease sourceをcheckout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.preflight.outputs.revision }}
          persist-credentials: false

      - name: checksumをdownload
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-checksums
          path: dist

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Formulaをrenderしてaudit
        id: formula
        run: |
          formula_dir=$(mktemp -d "${RUNNER_TEMP}/formula.XXXXXXXX")
          binary=$(go run ./tools/projectmeta --field binary_name)
          formula="${formula_dir}/${binary}.rb"
          ./scripts/render-formula.sh \
            "${{ needs.preflight.outputs.tag }}" \
            "https://github.com/${GITHUB_REPOSITORY}" \
            dist/checksums.txt \
            "${formula}"
          ruby -c "${formula}"
          ./scripts/audit-formula.sh "${formula}"
          echo "path=${formula}" >>"${GITHUB_OUTPUT}"

      - name: audit済みFormulaをupload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: audited-homebrew-formula
          path: ${{ steps.formula.outputs.path }}
          if-no-files-found: error
          retention-days: 1

  formula_publish:
    name: audit済みHomebrew Formulaを共有tapへ提案
    if: >-
      always() &&
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.stable == 'true' &&
      needs.formula.result == 'success'
    needs: [preflight, formula]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: audit済みFormulaをdownload
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: audited-homebrew-formula
          path: ${{ runner.temp }}/audited-formula

      - name: Formula artifactをdataとして検証
        shell: bash
        run: |
          formula_root="${RUNNER_TEMP}/audited-formula"
          mapfile -d '' -t entries < <(find "${formula_root}" -mindepth 1 -maxdepth 1 -print0)
          test "${#entries[@]}" -eq 1
          test "${entries[0]}" = "${formula_root}/cwk.rb"
          test -f "${entries[0]}"
          test ! -L "${entries[0]}"

      - name: Homebrew tap用GitHub App tokenを作成
        id: homebrew-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_KEY }}
          owner: tasuku43
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - name: 共有Homebrew tapをcheckout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: tasuku43/homebrew-tap
          ref: main
          token: ${{ steps.homebrew-token.outputs.token }}
          path: homebrew-tap
          persist-credentials: false

      - name: audit済みFormulaを共有tapへ配置
        run: |
          source_formula="${RUNNER_TEMP}/audited-formula/cwk.rb"
          formula_dir="homebrew-tap/Formula"
          target_formula="${formula_dir}/cwk.rb"
          test -f "${source_formula}"
          test -d "${formula_dir}"
          test ! -L "${formula_dir}"
          test ! -L "${target_formula}"
          if [[ -e "${target_formula}" ]]; then
            test -f "${target_formula}"
          fi
          cp "${source_formula}" "${target_formula}"
          cmp -s "${source_formula}" "${target_formula}"

      - name: Formula更新pull requestを作成
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.homebrew-token.outputs.token }}
          path: homebrew-tap
          add-paths: Formula/cwk.rb
          base: main
          branch: chore/homebrew-formula-${{ needs.preflight.outputs.tag }}-cwk
          delete-branch: true
          commit-message: "Update Homebrew formula for ${{ needs.preflight.outputs.tag }}"
          title: "Update Homebrew formula for ${{ needs.preflight.outputs.tag }}"
          body: |
            Formula/cwk.rbを${{ needs.preflight.outputs.tag }}の公開macOS release archiveへ更新します。
            Formulaは正確なtag sourceからrenderし、checksum固定とauditを完了しています。
