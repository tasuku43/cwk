name: 不具合報告
description: 非公開情報を含めず、再現可能な問題を報告します。
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        認証情報、トークン、非公開ホスト名、内部URL、顧客データ、独自のログを含めないでください。
        セキュリティ脆弱性の疑いがある場合は、公開Issueを作成せず SECURITY.md に従ってください。

  - type: input
    id: version
    attributes:
      label: バージョン
      description: "`cwk version` の出力、またはコミットSHAを記載してください。"
      placeholder: cwk 1.2.3 (0123456789abcdef...)
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      description: 合成入力を使い、決定的に再現できる最小の手順を記載してください。
      placeholder: |
        1. ... を実行する
        2. ... を確認する
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待した動作
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: サニタイズ済みの出力だけを含め、シークレットと非公開識別子を除去してください。
    validations:
      required: true

  - type: textarea
    id: thesis-impact
    attributes:
      label: テーゼまたは契約への影響
      description: 違反している可能性のあるテーゼ、出力契約、効果境界、IDフローを記載してください。

  - type: checkboxes
    id: public-safe
    attributes:
      label: 公開安全性の確認
      options:
        - label: シークレット、内部情報、個人データ、顧客データを除去しました。
          required: true
        - label: 非公開で報告すべきセキュリティ脆弱性ではありません。
          required: true
