version: '3'

tasks:
  build:
    desc: CLIバイナリをビルドします。
    cmds:
      - mkdir -p bin
      # Local builds intentionally retain the compiled dev version. Only the
      # validated release packaging path may inject version and revision data.
      - go build -buildvcs=false -trimpath -o bin/cwk ./cmd/cwk

  test:
    desc: Goテストスイートを実行します。
    cmds:
      - go test ./...

  test:race:
    desc: race detector付きでGoテストスイートを実行します。
    cmds:
      - go test -race ./...

  contracts:check:
    desc: コマンドカタログ、capability ledger、外部schema fixtureを検証します。
    cmds:
      - go run ./tools/contractlint

  check:fast:
    desc: ローカルとagent向けの短時間gateを実行します。
    cmds:
      - ./scripts/check.sh fast

  check:
    desc: 実装品質の必須gateを実行します。
    cmds:
      - ./scripts/check.sh full

  security:
    desc: 依存関係、脆弱性、静的security、secretのcheckを実行します。
    cmds:
      - ./scripts/check.sh security

  release:check:
    desc: release script、workflow、artifact、Formula contractを検証します。
    cmds:
      - ./scripts/check.sh release

  public:check:
    desc: repositoryを安全に公開できることを検証します。
    cmds:
      - ./scripts/check.sh public
